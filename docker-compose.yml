services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: wall4art
      POSTGRES_PASSWORD: wall4art
      POSTGRES_DB: wall4art
    ports:
      - '5432:5432'
    volumes:
      - wall4art_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wall4art']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  wall4art_pgdata:
